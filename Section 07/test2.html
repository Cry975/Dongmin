<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼 태그 연습</title>
</head>
<body>
    <form action="#" method="get" name="userform">
        <fieldset>
            <legend>회원정보</legend>
 <label for="userid">아이디 : </label><input type="text" name="userid"  id="userid" required placeholder="아이디를 입력해주세요."> <input type="button" value="중복확인"> <br>
        비밀번호 : <input type="password" name="password" id="password"><br>
        </fieldset>
        나이 : <input type="number" name="age" id="age" min="8" max="80"> <br>
        이메일: <input type="email" name="email" id="email"> <br>
        전화번호 : <input type="tel" name="tel" id="tel" readonly value="01012345678"> <br>
        좋아하는 과일 : <input type="checkbox" name="fruits" id="fruits" value="사과" checked>사과,
                    <input type="checkbox" name="fruits" id="fruits" value="오렌지">오렌지,
                     <input type="checkbox" name="fruits" id="fruits" value="포도">포도 <br>
        성별 : <input type="radio" name="gender" id="man" value="남성"><label for="man">남성</label>
               <input type="radio" name="gender" id="woman" value="여성"><label for="woman">여성</label> <br>
        생년월일: <input type="date" name="birth" id="birth"> <input type="datetime-local" name="" id=""> <br> <!-- 0000 00 00-->
        좋아하는 색: <input type="color" name="color" id="color"> <br>
        파일 업로드: <input type="file" name="file" id="file"> <br>
        <input type="hidden" name="">
        <input type="month" name="" id="">  <input type="time" name="" id=""><br>
        <input type="range" name="" id="">
        <input type="search" name="" id=""> <input type="url" name="" id="">
        <!-- 글상자 태그 -->
         <textarea name="massage" id="massage" cols="50" rows="5">텍스트</textarea>
         <!-- 선택 목록 태그 -->
         <select name="fruits" id="fruits" size="2" multiple>
            <option value="">선택해주세요</option>
            <option value="사과">사과</option>
            <option value="바나나">바나나</option>
            <option value="오렌지">오렌지</option>
         </select> <br>
        <button type="reset">초기화</button>
        <input type="reset" value="초기화">
        <input type="submit" value="제출">
    </form>
</body>
</html>
