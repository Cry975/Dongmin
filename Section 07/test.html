<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼 태그연습</title>
</head>
<body>
    <form action="#" method="post"> 
    <!-- action : 데이터를 전송할 서버 주소-->
    <!-- 백엔드 언어: PHP, Python, Ruby, Nodejs, Java-->
    <!--
        Get방식: 주소를 통해서 데이터를 전송하는 방식, 간단히 데이터 전송, 전송크기 제한있음. 보안 문제
        Post방식: 데이터를 공개적3으로 표시하지 않고 서버로 바로 전송(데이터 크기 제한x)
    -->
    아이디 : <input type="text" name="id" id="id" placeholder="아이디를 입력해주세요">
    <br>
    비밀번호: <input type="password" name="password" id="password" placeholder="비밀번호를 입력해주세요"> <br>
    <input type="submit" value="로그인">
    <br>
    <input type="checkbox" name="gender" id="gender" value="남성"> 남성
    <input type="checkbox" name="gender" id="gender" value="여성"> 여성
    <br>
    <input type="radio" name="gender" id="gender"> 남성
    <input type="radio" name="gender" id="gender"> 여성
    <br>
    <input type="radio" name="color" id="color" value="빨강"> 빨강
    <input type="radio" name="color" id="color" value="노랑"> 노랑
    <input type="radio" name="color" id="color" value="파랑"> 파랑
    </form>
    
</body>
</html>
