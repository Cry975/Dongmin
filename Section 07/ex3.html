<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배송 정보</title>
</head>
<body>
    <form action="#" method="post">
        <fieldset>
            <legend>배송 정보</legend>
            <p>
                <label for="name">받는 사람 *</label>
                <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required autofocus> 

            </p>
            <p>
                <label for="phone">연락처 *</label>
                <input type="tel" name="phone" id="phone" placeholder="010-0000-0000" required>                

            </p>
            <p>
                <label for="email">이메일</label>
                <input type="email" name="email" id="email" placeholder="example@email.com">

            </p>
            <p>
                <label for="address">주소 *</label>
                <input type="text" name="address" id="address" required>
            </p>
            <p>
                <label for="">배송 방법</label>
                <input type="radio" name="delivery" id="normal" value="normal" checked><label for="normal">일반 배송</label>
                <input type="radio" name="delivery" id="express" value="express"><label for="express">당일 배송</label>
            </p>
            <p>
            <label for="time">배송 희망시간</label>
            <select name="time" id="time">
                <option value="">선택해주세요</option>
                <option value="morning">오전(9시~12시)</option>
                <option value="afternoon">오후(12시~18시)</option>
                <option value="evening">저녁(18~21시)</option>

            </select>
            </p>
            <p>
                <label for="message">배송 요청사항</label> <br>
                <textarea name="message" id="message" cols="40" rows="4" placeholder="문 앞에 놓아주세요"></textarea>
            </p>
            <p>
                <input type="checkbox" name="agree" id="agree" required> <label for="agree">개인정보 수집에 동의합니다. *</label>
            </p>
            <input type="submit" value="주문하기">
            <input type="reset" value="다시 작성하기"> <br>
            <button type="submit">주문하기</button>
            <button type="reset">다시 작성하기</button>
        </fieldset>

    </form>
</body>
</html>
