<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>회원가입</h1>

    <form action="#" method="post">

        <fieldset>
            <legend>로그인 정보</legend>
            <!-- 텍스트 입력 -->
            <label for="username">이름:</label>
            <input type="text" id="username" name="username" placeholder="이름 입력" required>
            <button>중복확인</button>
            <br>
            <label for="userid">아이디:</label>
            <input type="text" id="userid" name="userid" placeholder="6~16자 소문자, 숫자" required>
            <br>

            <!-- 비밀번호 -->
            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password" minlength="8" maxlength="16" required>
            <br>

            <!-- 이메일 -->
            <label for="email">이메일:</label>
            <input type="email" id="email" name="email" required>
        </fieldset>
        
        <fieldset>
            <legend>추가 정보</legend>
            <!-- 전화번호 -->
            <label for="phone">전화번호:</label>
            <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
            <br>

            <!-- 날짜 -->
            <label for="birth">생년월일:</label>
            <input type="date" id="birth" name="birth">
            <br>

            <!-- 라디오 버튼 -->
            성별:
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">남자</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">여자</label>
            <br>

            <!-- 체크박스 -->
            관심 분야:
            <input type="checkbox" id="html" name="interest" value="html" checked>
            <label for="html">HTML</label>
            <input type="checkbox" id="css" name="interest" value="css">
            <label for="css">CSS</label>
            <input type="checkbox" id="js" name="interest" value="javascript">
            <label for="js">JavaScript</label>
            <br>

            <!-- 셀렉트 박스 -->
            <label for="job">직업:</label>
            <select id="job" name="job">
                <option value="">선택하세요</option>
                <option value="student">학생</option>
                <option value="developer">개발자</option>
                <option value="designer">디자이너</option>
            </select>
            <br>

            <!-- 텍스트 영역 -->
            <label for="message">자기소개:</label><br>
            <textarea id="message" name="message" rows="4" cols="40" placeholder="자기소개 작성"></textarea>
            <br>

            <!-- 파일 업로드 -->
            <label for="profile">프로필 사진:</label>
            <input type="file" id="profile" name="profile">
        </fieldset>
        <br>
        <!-- 버튼 -->
        <input type="submit" value="제출">
        <input type="reset" value="초기화">

    </form>
</body>
</html>
