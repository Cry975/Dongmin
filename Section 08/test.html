<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블 태그 연습</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="3">품목</th>
        </tr>
        <tr>
            <td align="center">사과</td>
            <td>빨간색</td>
            <td>5,000원</td>
        </tr>
        <tr>
            <td >바나나</td>
            <td>노란색</td>
            <td>6,000원</td>
        </tr>
        <tr>
            <td>포도</td>
            <td>보라색</td>
            <td>5,500원</td>
        </tr>
    </table>
    <table border="1" cellspacing="0">
        <tr>
            <th colspan="2">공휴일</th>
        </tr>
        <tr>
            <th rowspan="3">1월</th>
            <td>신정</td>
        </tr>
        <tr>
            <td>설 연휴</td>
        </tr>
        <tr>
            <td>대체 공휴일</td>
        </tr>
        <tr>
            <th rowspan="2">5월</th>
            <td>어린이날</td>
        </tr>
        <td>석가탄신일</td>
    </table>

    <h2>공지사항</h2>
    <table border="1">
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>작성일</th>
            <th>조회수</th>
        </tr>
        <tr>
            <td align="center">2</td>
            <td>2026년 상반기 안내</td>
            <td>관리자</td>
            <td>2026년1월2일</td>
            <td align="center">245</td>
        </tr>
        <tr>
            <td align="center">1</td>
            <td>설 연휴 휴무 공지</td>
            <td>관리자</td>
            <td>2026년1월1일</td>
            <td align="center">123</td>
        </tr>
    </table>
</body>
</html>
