<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소 연습</title>
</head>
<body>
    <!-- 인라인 요소 --> 
     <span style="border: 2px solid red; width: 200px;">HTML</span>
     <!-- solid: 선 두께   선의 종류    선의 색깔-->
     <span>CSS</span>
     <strong>안녕하세요</strong>
     <!-- 블록 요소 -->
     <p style="border: 2px solid red; width: 100px;">HTML</p>
     <p>CSS</p>

     <p>즐거운 <strong>html</strong> 수업시간</p>
</body>
</html>
