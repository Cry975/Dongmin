<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리스트 연습</title>
</head>
<body> <!-- 순서가 있는 리스트 -->
    <ol start="3" reversed>
        <li>HTML</li>
        <li>CSS</li>
        <li>Javascript</li>
    </ol>
    <!-- 순서가 없는 리스트-->
    <ul type="none">
        <li>HTML</li>
        <li>CSS</li>
        <li>Javascript</li>
    </ul>
    <!-- 용어 설명 -->
    <dl>
        <dt>HTML</dt>
        <dd>웹페이지를 만들기 위한 언어</dd>
    </dl>
</body>
</html>
