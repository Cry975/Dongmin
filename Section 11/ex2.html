<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선택자</title>
    <link rel="stylesheet" href="./ex2.css">
</head>
<body>
    <div id="wrap">
        <div id="header">
            <h1 class="logo">ABC 학교</h1>
            <p class="desc">웹 개발 과정</p>
            <!-- desc : description 줄임말 -->
        </div>
        <div id="nav">
            <ul>
                <li>학교 소개

                <li>과정 소개
