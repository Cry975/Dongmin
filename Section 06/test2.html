<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 태그</title>
</head>
<body>
    <!-- 이미지 태그 -->
    <img src="./image/apple.jpg" alt="사과" width="500" height="500"> <!-- 상대 경로 -->   
    <img src="https://www.dummyimage.com/300x400/" alt="이미지"> <!-- 절대 경로 -->

    <!-- 오디오 태그 -->
    <audio src="./music.mp3"  controls>
        현재 브라우저에서는 이 오디오가 지원하지 않습니다.
    </audio>

    <!-- 비디오 태그-->
    <video src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" controls width="400" height="250" poster="./video-poster.jpg"></video>
    <video src="./night.mp4" controls></video>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/0t8qA395BGo?si=vjMHkZk4Nza6YTXU" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <audio controls>
        <source src="./music.mp3" type="audio/mp3">
        <source src="./music.ogg" type="audio/ogg">
        현재 브라우저에서는 이 오디오가 지원하지 않습니다.
    </audio>
</body>
</html>
