<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제목과 단락</title>
</head>
<body>
    <!-- 제목 태그 -->
    <h1>제목1</h1>

    <h5>제목5</h5>
    <h6>제목6</h6>
    <!--단락 태그-->
    <p>단락 태그</p>
    <p>우리는 지금 HTML에 대해<br> 공부하고 있습니다.</p>
</body>
</html>
