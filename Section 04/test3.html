<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>텍스트 연습</title>
</head>
<body>
    <h1>제목1</h1>
    <h2>제목2</h2>
    <p><mark>HTML</mark>, <span style="color: red;">CSS</span> , <small>Javascript</small></p>
    <p>2 <sub>2</sub><sup>2</sup></p>
    <p>HTML , <s>CSS</s> , <del>Javascript</del></p>
    <p>HTML , <u>CSS</u> , <ins>Javascript</ins></p>
    <p>
        HTML, <br>
        CSS, 
        Javascript
    </p>
    <pre>
        HTML,
        CSS, 
        Javascript
    </pre>
    <!-- 특수 문자 -->
     <p>&lt;특수문자&gt;</p>
     <p>&amp;&nbsp;&nbsp;&nbsp;&quot; &copy;</p>
</body>
</html>
